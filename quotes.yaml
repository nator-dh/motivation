# Motivational quote library.
#
# Schedule cheat sheet (5-field cron, evaluated in `defaults.timezone`):
#   "0 9 * * *"        every day at 09:00
#   "0 9,13,17 * * *"  09:00, 13:00, 17:00 daily
#   "*/30 * * * *"     every 30 minutes
#   "0 10 * * MON-FRI" 10:00 on weekdays
#   "*/2 * * * *"      every 2 minutes (handy for testing)

defaults:
  # IANA timezone. Leave empty to use system local time.
  timezone: ""

# General schedules pick a random quote from the pool at each tick.
# Use `category` to restrict the pool, or omit it for "anything goes".
general_schedules:
  - cron: "0 9,13,17 * * *"
    category: focus
  - cron: "30 11 * * MON-FRI"
  - cron: "*/30 * * * *"

quotes:
  - id: marcus-mind
    text: "You have power over your mind — not outside events. Realize this, and you will find strength."
    author: Marcus Aurelius
    categories: [stoic, focus]
    media:
      - https://dummyimage.com/800x600/1a1a1a/ffffff.png&text=You+have+power+over+your+mind+-+Marcus+Aurelius
    schedules:
      - "0 6 * * MON"

  - id: jobs-stay-hungry
    text: "Stay hungry. Stay foolish."
    author: Steve Jobs
    categories: [drive]
    media:
      - https://dummyimage.com/800x600/1a1a1a/ffffff.png&text=Stay+hungry.+Stay+foolish.+-+Steve+Jobs
    schedules:
      - "0 8 * * MON"

  - id: denzel-ease
    text: "Without commitment, you'll never start, but more importantly, without consistency, you'll never finish."
    author: Denzel Washington
    categories: [drive, focus, craft]
    media:
      - https://dummyimage.com/800x600/1a1a1a/ffffff.png&text=Without+consistency+you+will+never+finish.+-+Denzel+Washington
    schedules:
      - "0 6 * * TUE"

  - id: jordan-fail
    text: "I've failed over and over and over again in my life. And that is why I succeed."
    author: Michael Jordan
    categories: [drive, resilience]
    media:
      - https://dummyimage.com/800x600/1a1a1a/ffffff.png&text=I+fail+over+and+over+again+and+that+is+why+I+succeed.+-+MJ
    schedules:
      - "0 8 * * TUE"

  - id: feynman-fool
    text: "The first principle is that you must not fool yourself — and you are the easiest person to fool."
    author: Richard Feynman
    categories: [focus, craft]
    media:
      - https://dummyimage.com/800x600/1a1a1a/ffffff.png&text=You+must+not+fool+yourself.+-+Richard+Feynman
    schedules:
      - "0 6 * * WED"

  - id: churchill-going
    text: "If you are going through hell, keep going."
    author: Winston Churchill
    categories: [resilience]
    media:
      - https://dummyimage.com/800x600/1a1a1a/ffffff.png&text=If+you+are+going+through+hell+keep+going.+-+Churchill
    schedules:
      - "0 8 * * WED"

  - id: dynamic-disney
    text: "The way to get started is to quit talking and begin doing."
    author: Walt Disney
    categories: [drive, craft]
    media:
      - https://dummyimage.com/800x600/1a1a1a/ffffff.png&text=Quit+talking+and+begin+doing.+-+Walt+Disney
    schedules:
      - "0 6 * * THU"

  - id: aristotle-excellence
    text: "We are what we repeatedly do. Excellence, then, is not an act, but a habit."
    author: Aristotle
    categories: [craft, focus]
    media:
      - https://dummyimage.com/800x600/1a1a1a/ffffff.png&text=Excellence+is+not+an+act+but+a+habit.+-+Aristotle
    schedules:
      - "0 8 * * THU"

  - id: ford-think
    text: "Whether you think you can or you think you can't, you're right."
    author: Henry Ford
    categories: [focus, drive]
    media:
      - https://dummyimage.com/800x600/1a1a1a/ffffff.png&text=Whether+you+think+you+can+or+can+t+you+re+right.+-+Henry+Ford
    schedules:
      - "0 8 * * FRI"

  - id: tyson-plan
    text: "Everyone has a plan 'till they get punched in the mouth."
    author: Mike Tyson
    categories: [resilience]
    media:
      - https://dummyimage.com/800x600/1a1a1a/ffffff.png&text=Everyone+has+a+plan+till+they+get+punched+in+the+mouth.+-+Tyson
    schedules:
      - "0 9 * * SAT"

  - id: james-habit
    text: "Every action you take is a vote for the type of person you wish to become."
    author: James Clear
    categories: [focus, craft]
    media:
      - https://dummyimage.com/800x600/1a1a1a/ffffff.png&text=Every+action+is+a+vote+for+who+you+wish+to+become.+-+James+Clear
    schedules:
      - "0 11 * * SAT"

  - id: sandberg-done
    text: "Done is better than perfect."
    author: Sheryl Sandberg
    categories: [craft, drive]
    media:
      - https://dummyimage.com/800x600/1a1a1a/ffffff.png&text=Done+is+better+than+perfect.+-+Sheryl+Sandberg
    schedules:
      - "0 9 * * SUN"

  - id: gautama-mind
    text: "The mind is everything. What you think you become."
    author: Gautama Buddha
    categories: [wisdom, focus]
    media:
      - https://dummyimage.com/800x600/1a1a1a/ffffff.png&text=The+mind+is+everything.+What+you+think+you+become.+-+Buddha
    schedules:
      - "0 11 * * SUN"

  - id: lowe-finish
    text: "The secret of getting ahead is getting started."
    author: Mark Twain
    categories: [drive, focus]
    media:
      - https://dummyimage.com/800x600/1a1a1a/ffffff.png&text=The+secret+of+getting+ahead+is+getting+started.+-+Mark+Twain
